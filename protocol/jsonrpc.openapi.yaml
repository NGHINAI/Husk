openapi: 3.1.0
info:
  title: Husk JSON-RPC API
  version: 0.0.0
  description: |
    JSON-RPC 2.0 over HTTP/1.1 + HTTP/2 (server: Node `http`). Single
    endpoint at /v1/jsonrpc accepting POSTed JSON-RPC envelopes.

    Six methods in v0:
      - health           — server liveness + active session count
      - create_session   — spawn a lightpanda subprocess + open CDP
      - goto             — navigate the session to a URL
      - snapshot         — return a spec-§5.2 JSON-LD snapshot
      - snapshot_diff    — return diff vs prior snapshot, or null
      - close_session    — tear down the session

    Custom JSON-RPC error codes:
      -32001  Session not found
      -32002  Engine error (lightpanda subprocess failure)
      -32003  Lightpanda binary not found
      -32004  Invalid URL

    Plus JSON-RPC 2.0 standard codes (-32600..-32700).
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:7777
    description: Local orchestrator (default)

paths:
  /v1/jsonrpc:
    post:
      summary: JSON-RPC 2.0 endpoint
      operationId: jsonrpc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
      responses:
        "200":
          description: JSON-RPC response (success or error in envelope)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
        "405":
          description: Method Not Allowed (only POST accepted on this endpoint)

components:
  schemas:
    JsonRpcRequest:
      type: object
      required: [jsonrpc, method, id]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
          enum:
            - health
            - create_session
            - goto
            - snapshot
            - snapshot_diff
            - close_session
        params:
          type: object
        id:
          oneOf: [{ type: string }, { type: integer }]

    JsonRpcResponse:
      type: object
      required: [jsonrpc, id]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        result: {}
        error:
          $ref: "#/components/schemas/JsonRpcError"
        id:
          oneOf: [{ type: string }, { type: integer }, { type: "null" }]

    JsonRpcError:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: |
            JSON-RPC error code. Husk custom codes: -32001 (session not
            found), -32002 (engine error), -32003 (binary not found),
            -32004 (invalid URL). Plus JSON-RPC 2.0 standard codes.
        message:
          type: string
        data: {}

    HealthResult:
      type: object
      required: [ok, version, activeSessions]
      properties:
        ok:
          type: boolean
          const: true
        version:
          type: string
        activeSessions:
          type: integer

    CreateSessionResult:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string

    GotoParams:
      type: object
      required: [session_id, url]
      properties:
        session_id:
          type: string
        url:
          type: string
          format: uri

    SnapshotParams:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string

    CloseSessionParams:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
